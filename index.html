<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- SEO & Social -->
    <title>MODO — کوچ هوشمند شخصی</title>
    <meta name="description" content="MODO یک کوچ هوشمند شخصیه که بهت کمک میکنه ساختار بسازی، اجرا کنی و هر روز یک قدم جلوتر بری." />
    <meta name="theme-color" content="#10B981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MODO" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Font -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- ─── جلوگیری از فلش سفید: تم را قبل از React اعمال کن ─── -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('modo-theme');
          var isDark = saved === null ? true : saved === 'dark';
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
          var accent = localStorage.getItem('modo-accent');
          if (accent && ['emerald','blue','purple','rose','amber'].indexOf(accent) !== -1) {
            document.documentElement.setAttribute('data-accent', accent);
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
